<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kerframe — brand preview</title>
  <style>
    body { margin: 0; font: 15px system-ui, sans-serif; background: #1a1f26; color: #e9edf3; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 14px; letter-spacing: 3px; color: #6b7686; font-weight: 600; text-transform: uppercase; }
    .row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; margin: 18px 0 40px; }
    .tile { padding: 24px; border-radius: 14px; }
    .dark { background: #222831; }
    .light { background: #f4efe2; }
    .swatch { width: 56px; height: 56px; border-radius: 10px; display: inline-block; margin-right: 8px; vertical-align: middle; }
    code { color: #e8b248; }
    .muted { color: #8a93a2; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Kerframe · logo lockup</h1>
    <div class="row tile dark"><img src="kerframe-logo.svg" alt="Kerframe logo" width="360" /></div>

    <h1>App icon / favicon</h1>
    <div class="row">
      <div class="tile dark"><img src="kerframe-icon.svg" width="96" /></div>
      <div class="tile dark"><img src="kerframe-icon.svg" width="48" /></div>
      <div class="tile dark"><img src="kerframe-icon.svg" width="24" /></div>
      <span class="muted">96 · 48 · 24 px — checks legibility when small</span>
    </div>

    <h1>Palette</h1>
    <div class="row">
      <span><span class="swatch" style="background:#e0a93a"></span><code>#e0a93a</code> amber</span>
      <span><span class="swatch" style="background:#222831"></span><code>#222831</code> charcoal</span>
      <span><span class="swatch" style="background:#f1e4ba"></span><code>#f1e4ba</code> cream</span>
      <span><span class="swatch" style="background:#aeb7c6"></span><code>#aeb7c6</code> steel</span>
    </div>
  </div>
</body>
</html>
