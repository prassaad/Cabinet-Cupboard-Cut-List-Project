<svg width="370" height="96" viewBox="0 0 370 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WallView">
  <!-- ===== Icon: a run of cabinets on a floor line ===== -->
  <g transform="translate(12 12)">
    <rect x="0" y="0" width="72" height="72" rx="16" fill="#222831"/>
    <rect x="9" y="9" width="54" height="54" rx="9" fill="none" stroke="#39424f" stroke-width="2"/>
    <g stroke="#e0a93a" stroke-width="3" stroke-linejoin="round" fill="none">
      <rect x="15" y="37" width="13" height="17"/>          <!-- base cabinet -->
      <rect x="30" y="20" width="14" height="34"/>          <!-- tall cabinet -->
      <rect x="46" y="29" width="11" height="25"/>          <!-- wall cabinet -->
      <path d="M30 37 H44"/>                                <!-- shelf -->
    </g>
    <path d="M11 54 H61" stroke="#f1e4ba" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- ===== Wordmark: wall + view ===== -->
  <text x="100" y="52" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-size="40" font-weight="700" letter-spacing="-1.2">
    <tspan fill="#e8b248">wall</tspan><tspan fill="#aeb7c6">view</tspan>
  </text>
  <!-- tagline -->
  <text x="101" y="74" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="2.6" fill="#6b7686">SCALE · DESIGN · CUT</text>
</svg>
