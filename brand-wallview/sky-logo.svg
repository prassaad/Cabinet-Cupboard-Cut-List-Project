<svg width="344" height="132" viewBox="0 0 344 132" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sky Interiors">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7cd86"/>
      <stop offset=".45" stop-color="#c49a3c"/>
      <stop offset=".7" stop-color="#9a7320"/>
      <stop offset="1" stop-color="#d8b964"/>
    </linearGradient>
  </defs>

  <!-- bird perched above the wordmark -->
  <path d="M40 30c2-9 13-12 17-6 4-5 12-3 11 3 5-1 8 3 5 6-3 3-9 2-12-1-1 5-7 7-12 5l4 6-7-2-2 7-3-8c-5 0-9-5-7-10 1-3 5-4 8-2z"
        fill="url(#gold)"/>

  <!-- "sky" wordmark -->
  <text x="20" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700"
        font-style="italic" fill="url(#gold)">sky</text>

  <!-- furniture vignette inside a thin frame -->
  <g stroke="url(#gold)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="172" y="20" width="140" height="74" rx="2"/>
    <!-- framed picture on the wall -->
    <rect x="186" y="32" width="26" height="22"/>
    <path d="M190 50l6-8 5 5 4-5 5 8z"/>
    <!-- pendant lamp -->
    <path d="M268 20v26"/>
    <circle cx="268" cy="54" r="8" fill="url(#gold)" stroke="none"/>
    <!-- armchair -->
    <path d="M214 84v-16a7 7 0 0 1 7-7h12a7 7 0 0 1 7 7v16"/>
    <path d="M210 84v-10a4 4 0 0 1 4-4M244 84v-10a4 4 0 0 0-4-4"/>
    <path d="M214 78h26"/>
    <!-- side table -->
    <path d="M250 84v-12h12v12M252 72v-3h8v3"/>
  </g>

  <!-- INTERIORS -->
  <text x="174" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="600"
        letter-spacing="5.2" fill="url(#gold)">INTERIORS</text>
</svg>
